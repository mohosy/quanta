<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quanta</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="layout">
      <section class="panel">
        <p class="eyebrow">Physics + Performance Lab</p>
        <h1>Quanta</h1>
        <p class="desc">Compare brute-force and spatial-grid gravity simulation in a live N-body sandbox.</p>

        <div class="card">
          <h2>Simulation</h2>
          <label>Particles
            <input id="count" type="range" min="80" max="900" step="20" value="320" />
            <span id="countVal">320</span>
          </label>
          <label>Gravity
            <input id="gravity" type="range" min="0.02" max="0.9" step="0.01" value="0.28" />
            <span id="gravityVal">0.28</span>
          </label>
          <label>Damping
            <input id="damping" type="range" min="0.85" max="0.999" step="0.001" value="0.985" />
            <span id="dampingVal">0.985</span>
          </label>
          <label>Algorithm
            <select id="mode">
              <option value="grid">Spatial Grid (Fast)</option>
              <option value="naive">Brute Force (O(n²))</option>
            </select>
          </label>
          <div class="row">
            <button id="restart">Restart</button>
            <button id="burst">Add Energy Burst</button>
          </div>
        </div>

        <div class="card metrics">
          <h2>Metrics</h2>
          <p>Frame time: <strong id="frameMs">0 ms</strong></p>
          <p>Estimated interactions: <strong id="ops">0</strong></p>
          <p>Average speed: <strong id="speed">0</strong></p>
          <p>Energy index: <strong id="energy">0</strong></p>
        </div>
      </section>

      <section class="viz">
        <article class="card">
          <h2>Particle Field</h2>
          <canvas id="canvas" width="1080" height="640"></canvas>
        </article>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
